<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | {{ app_name|default:"Project Accounting" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --home-bg: #0f172a;
            --home-surface: #1e293b;
            --home-text: #e2e8f0;
            --home-muted: #94a3b8;
            --home-primary: #2563eb;
            --login-brand-size: clamp(1.5rem, 4vw, 1.875rem);
            --login-brand-tag-size: clamp(0.6875rem, 2vw, 0.8125rem);
            --login-brand-color: #93c5fd;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: var(--home-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }
        .login-card {
            background: var(--home-surface);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        }
        .login-brand {
            margin-bottom: 1.25rem;
        }
        .login-brand h1 {
            font-size: var(--login-brand-size);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin: 0 0 0.35rem;
            color: #f8fafc;
            line-height: 1.2;
        }
        .login-brand p {
            color: var(--home-muted);
            font-size: 0.9375rem;
            margin: 0;
        }
        .login-saas-tag {
            display: inline-block;
            margin-left: 8px;
            padding: 3px 9px;
            border-radius: 999px;
            font-size: var(--login-brand-tag-size);
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #dbeafe;
            background: rgba(37, 99, 235, 0.28);
            border: 1px solid rgba(96, 165, 250, 0.45);
            vertical-align: middle;
        }
        label { color: var(--home-muted); font-size: 0.875rem; font-weight: 500; }
        .form-control {
            background: #0f172a;
            border-color: #334155;
            color: var(--home-text);
            font-size: 0.9375rem;
        }
        .form-control:focus {
            background: #0f172a;
            border-color: var(--home-primary);
            color: var(--home-text);
            box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.25);
        }
        .btn-primary {
            background-color: var(--home-primary);
            border: none;
            font-weight: 600;
            font-size: 0.9375rem;
            padding: 0.55rem 1rem;
        }
        .btn-primary:hover { background-color: #1d4ed8; }
        .alert-danger {
            background: rgba(220, 38, 38, 0.15);
            border-color: #dc2626;
            color: #fecaca;
            font-size: 0.875rem;
        }
        .login-footer {
            margin-top: 1.25rem;
            text-align: center;
            font-size: 0.8125rem;
            color: var(--home-muted);
        }
        .login-footer a { color: var(--login-brand-color); text-decoration: none; }
        .login-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <h1>{{ app_name|default:"Project Accounting" }}<span class="login-saas-tag">SaaS</span></h1>
            <p>Sign in to continue</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger py-2" role="alert">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
            <div class="mb-3">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" class="form-control" required autofocus autocomplete="username" value="{{ form.username.value|default:'' }}">
            </div>
            <div class="mb-4">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" class="form-control" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <p class="login-footer mb-0"><a href="{% url 'home' %}">Back to home</a></p>
    </div>
</body>
</html>
