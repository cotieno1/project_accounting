<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | {{ app_name|default:"Project Accounting" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --home-bg: #0f172a;
            --home-surface: #1e293b;
            --home-text: #e2e8f0;
            --home-muted: #94a3b8;
            --home-primary: #2563eb;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: var(--home-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .login-card {
            background: var(--home-surface);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 420px;
        }
        .login-card h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        .login-card p {
            color: var(--home-muted);
            font-size: 0.9rem;
        }
        label { color: var(--home-muted); font-size: 0.875rem; }
        .form-control {
            background: #0f172a;
            border-color: #334155;
            color: var(--home-text);
        }
        .form-control:focus {
            background: #0f172a;
            border-color: var(--home-primary);
            color: var(--home-text);
            box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.25);
        }
        .btn-primary {
            background-color: var(--home-primary);
            border: none;
        }
        .btn-primary:hover { background-color: #1d4ed8; }
        .alert-danger {
            background: rgba(220, 38, 38, 0.15);
            border-color: #dc2626;
            color: #fecaca;
        }
        a { color: #38bdf8; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>{{ app_name|default:"Project Accounting" }}</h1>
        <p class="mb-4">Sign in to continue</p>

        {% if form.errors %}
        <div class="alert alert-danger py-2" role="alert">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
            <div class="mb-3">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" class="form-control" required autofocus autocomplete="username" value="{{ form.username.value|default:'' }}">
            </div>
            <div class="mb-4">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" class="form-control" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <p class="mt-3 mb-0 text-center"><a href="{% url 'home' %}">Back to home</a></p>
    </div>
</body>
</html>
