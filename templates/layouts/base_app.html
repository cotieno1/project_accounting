{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_short_name|default:"Project Accounting" }}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/pioneer/tokens.css' %}">
    <link rel="stylesheet" href="{% static 'css/pioneer/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/pioneer/layout-cockpit.css' %}?v=3">
    <link rel="stylesheet" href="{% static 'css/pioneer/components.css' %}">
    <link rel="stylesheet" href="{% static 'css/pioneer/modals.css' %}">
    <link rel="stylesheet" href="{% static 'css/pioneer/responsive.css' %}?v=2">
    {% block extra_css %}{% endblock %}
</head>
<body class="cockpit-app {% block body_class %}{% endblock %}">
    {% block body %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>
