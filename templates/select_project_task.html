{% load pioneer_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Project Accounting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --primary: #2563eb; }
        body { margin: 0; font-family: Inter, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 32px; width: 100%; max-width: 480px; }
        h1 { margin: 0 0 8px; font-size: 1.35rem; }
        p { color: var(--muted); margin: 0 0 20px; line-height: 1.5; }
        select, button { width: 100%; box-sizing: border-box; font-size: 15px; }
        select { padding: 12px; background: #0f172a; border: 1px solid var(--border); color: var(--text); border-radius: 8px; margin-bottom: 12px; }
        button { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .back { display: inline-block; margin-top: 16px; color: var(--muted); text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>{{ title }}</h1>
        <p>Choose which project task you want to work on. Nothing is selected until you confirm.</p>
        <form method="get" action="{{ continue_path }}">
            <select name="task_id" id="task_id" required>
                <option value="">-- Select project task --</option>
                {% for t in tasks %}
                <option value="{{ t.project_id|clean_task_id }}">{{ t.project_id|clean_task_id }}: {{ t.description|clean_task_description }}</option>
                {% endfor %}
            </select>
            <button type="submit" id="continueBtn" disabled>Continue</button>
        </form>
        <a href="{% url 'ops_dashboard' %}" class="back">Back to Ops Dashboard</a>
    </div>
    <script>
        const sel = document.getElementById('task_id');
        const btn = document.getElementById('continueBtn');
        sel.addEventListener('change', function () { btn.disabled = !sel.value; });
    </script>
</body>
</html>
